        // universal Ajax request handler
        function sendRequestForServer(route, type = 'GET', requestData = null, async = false) {
            let response;
            let request = {
                url: route,
                async: async,
                type: type,
                cache: false,
                success: function (responseData) {
                    response = responseData;
                },
                error: function(e)
                {
                    response = false;
                    console.error(e);
                }
            };
            if(requestData instanceof FormData)
            {
                request.contentType = false;
                request.processData = false;
            }

            if(requestData != null){
                request.data = requestData;
            }

            $.ajax(request);

            return response;
        }
    </script>
